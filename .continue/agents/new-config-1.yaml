name: LocalConfig
version: 1.0.0
schema: v1
models:
  - name: Llama 3.1 8B
    provider: ollama
    model: llama3.1:8b
    roles:
      - chat
      - edit
      - apply
  - name: Qwen2.5-Coder 1.5B
    provider: ollama
    model: qwen2.5-coder:1.5b-base
    roles:
      - autocomplete
  - name: Nomic Embed
    provider: ollama
    model: nomic-embed-text:latest
    roles:
      - embed
  - name: Llama 3.1
    provider: ollama
    model: llama3.1:latest
    apiBase: http://localhost:11434
    roles:
      - chat
      - edit
      - apply
      - summarize
    defaultCompletionOptions:
      keepAlive: 3600
      temperature: 0.7
      contextLength: 8192
  - name: Qwen 2.5 Coder
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://localhost:11434
    roles:
      - chat
      - edit
      - autocomplete
    defaultCompletionOptions:
      keepAlive: 3600
    autocompleteOptions:
      debounceDelay: 250
      maxPromptTokens: 1024
      onlyMyCode: true
context:
  - provider: file
  - provider: code
  - provider: terminal
  - provider: diff
rules:
  - Responda sempre em Português do Brasil, a menos que solicitado o contrário.
  - Seja conciso e foque em boas práticas de programação Java e Clean Code.
